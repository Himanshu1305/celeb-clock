name = "bornclock"
compatibility_date = "2026-07-08"
compatibility_flags = ["nodejs_compat"]
main = "functions/_worker.js"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"

[[triggers]]
crons = ["0 6 * * *"]

# Secrets added via CF dashboard — do not add secret values here
# process.env works via nodejs_compat shim for all simple string reads

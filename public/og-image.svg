<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a2e"/>
      <stop offset="50%" style="stop-color:#1a0a3e"/>
      <stop offset="100%" style="stop-color:#0d1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="120" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="340" cy="150" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="900" cy="60" r="2" fill="white" opacity="0.5"/>
  <circle cx="1080" cy="200" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="200" cy="400" r="2" fill="white" opacity="0.4"/>
  <circle cx="1000" cy="480" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="600" cy="100" r="1" fill="white" opacity="0.6"/>
  <circle cx="750" cy="520" r="2" fill="white" opacity="0.3"/>
  <!-- Clock icon -->
  <circle cx="600" cy="230" r="80" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.8"/>
  <line x1="600" y1="165" x2="600" y2="230" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="600" y1="230" x2="645" y2="265" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
  <circle cx="600" cy="230" r="6" fill="url(#accent)"/>
  <!-- Title -->
  <text x="600" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="white">BornClock</text>
  <!-- Tagline -->
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" text-anchor="middle" fill="#8B5CF6">Know your time. Live it well.</text>
  <!-- Sub-tagline -->
  <text x="600" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.6)">Life expectancy · Birthday insights · Zodiac · Celebrity twins</text>
  <!-- URL -->
  <text x="600" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.4)">bornclock.com</text>
</svg>
